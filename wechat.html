<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公众号编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .toolbar {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #1890ff;
            color: #fff;
        }
        .btn-primary:hover {
            background: #40a9ff;
        }
        .btn-success {
            background: #52c41a;
            color: #fff;
        }
        .btn-success:hover {
            background: #73d13d;
        }
        .btn-warning {
            background: #faad14;
            color: #fff;
        }
        .btn-warning:hover {
            background: #ffc53d;
        }
        .editor-wrapper {
            display: flex;
            gap: 20px;
            height: calc(100vh - 180px);
            min-height: 500px;
        }
        .editor-panel, .preview-panel {
            flex: 1;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 15px;
            background: #fafafa;
            border-bottom: 1px solid #e8e8e8;
            font-weight: 600;
            color: #333;
        }
        #htmlInput {
            flex: 1;
            width: 100%;
            padding: 15px;
            border: none;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }
        #previewArea {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #fff;
        }
        .tips {
            background: #fff7e6;
            border: 1px solid #ffd591;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #d46b08;
        }
        .tips strong {
            color: #d4380d;
        }
        /* 手机预览框架 */
        .phone-frame {
            width: 375px;
            margin: 0 auto;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 公众号编辑器</h1>
        
        <div class="tips">
            <strong>使用说明：</strong>
            1. 在左侧输入/粘贴HTML代码 → 2. 点击"预览"查看效果 → 3. 点击"复制渲染内容" → 4. 粘贴到公众号后台
        </div>
        
        <div class="toolbar">
            <button class="btn btn-primary" onclick="renderPreview()">👁️ 预览</button>
            <button class="btn btn-success" onclick="copyRenderedContent()">📋 复制渲染内容</button>
            <button class="btn btn-warning" onclick="clearAll()">🗑️ 清空</button>
            <button class="btn btn-primary" onclick="loadSample()">📄 加载示例</button>
        </div>
        
        <div class="editor-wrapper">
            <div class="editor-panel">
                <div class="panel-header">HTML 代码</div>
                <textarea id="htmlInput" placeholder="在此粘贴HTML代码..."></textarea>
            </div>
            <div class="preview-panel">
                <div class="panel-header">预览效果（模拟公众号样式）</div>
                <div id="previewArea"></div>
            </div>
        </div>
    </div>

    <script>
        function renderPreview() {
            const htmlInput = document.getElementById('htmlInput').value;
            const previewArea = document.getElementById('previewArea');
            
            // 提取body内容
            let content = htmlInput;
            
            // 如果是完整HTML文档，提取body内容
            const bodyMatch = htmlInput.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
            if (bodyMatch) {
                content = bodyMatch[1];
            } else {
                // 如果没有body标签，尝试提取div内容
                const divMatch = htmlInput.match(/<div[^>]*>([\s\S]*?)<\/div>/i);
                if (divMatch && !htmlInput.includes('<html')) {
                    content = htmlInput;
                }
            }
            
            // 创建手机框架预览
            previewArea.innerHTML = `<div class="phone-frame">${content}</div>`;
        }
        
        function copyRenderedContent() {
            const previewArea = document.getElementById('previewArea');
            const phoneFrame = previewArea.querySelector('.phone-frame');
            
            if (!phoneFrame || !phoneFrame.innerHTML.trim()) {
                alert('请先点击"预览"按钮！');
                return;
            }
            
            // 创建临时元素用于复制
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = phoneFrame.innerHTML;
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            document.body.appendChild(tempDiv);
            
            // 选中并复制
            const range = document.createRange();
            range.selectNodeContents(tempDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                document.execCommand('copy');
                alert('✅ 复制成功！现在可以粘贴到公众号后台了。');
            } catch (err) {
                alert('❌ 复制失败，请手动选择内容复制。');
            }
            
            selection.removeAllRanges();
            document.body.removeChild(tempDiv);
        }
        
        function clearAll() {
            if (confirm('确定要清空所有内容吗？')) {
                document.getElementById('htmlInput').value = '';
                document.getElementById('previewArea').innerHTML = '';
            }
        }
        
        function loadSample() {
            const sampleHTML = `<!-- TEMPLATE_VERSION: vFinal -->
<div style="background-color:#ffffff;color:#333333;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif;margin:0;padding:0;">
  <div style="padding:0 20px;">
    <div style="margin:0 0 48px 0;">
      <img src="https://s.coze.cn/image/VXAUc13sI8I/" alt="封面图" style="width:100%;height:auto;border-radius:12px;display:block;">
      <div style="margin:8px 0 0 0;font-size:12px;line-height:1.7;color:#8b949e;">
        图注说明
      </div>
    </div>
    <div style="margin:0 0 48px 0;">
      <div style="margin:0 0 16px 0;font-size:18px;font-weight:800;color:#ff6b35;">
        标题 🎯
      </div>
      <p style="margin:0 0 24px 0;font-size:14px;line-height:2.0;color:#333333;">
        这里是正文内容，可以在这里输入你的文章内容。
      </p>
    </div>
  </div>
</div>`;
            
            document.getElementById('htmlInput').value = sampleHTML;
            renderPreview();
        }
        
        // 页面加载时自动渲染
        document.getElementById('htmlInput').addEventListener('input', function() {
            // 防抖处理
            clearTimeout(this.timer);
            this.timer = setTimeout(renderPreview, 500);
        });
    </script>
</body>
</html>
